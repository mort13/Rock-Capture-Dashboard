# Triggered by a repository_dispatch event sent from the database submodule repo.
# Set up: add a secret called DASHBOARD_PAT (Personal Access Token with repo scope)
# to the submodule repo, then add the workflow below to it.

name: Update Database Submodule

on:
  repository_dispatch:
    types: [database-updated]
  # Also allows manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dashboard repo with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update database submodule to latest
        run: |
          git submodule update --remote Databank/Rock-Capture-Database

      - name: Commit and push if submodule changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Databank/Rock-Capture-Database
          if git diff --staged --quiet; then
            echo "Submodule already up to date, nothing to commit."
          else
            git commit -m "chore: update database submodule [skip ci]"
            git push
          fi
